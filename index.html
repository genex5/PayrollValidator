<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Data Management</title>
    <style>
        body {
            font-family: sans-serif;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
        #log {
            white-space: pre-wrap;
            background: #eee;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Payroll Data Management</h1>

    <h2>Add New Record</h2>
    <form id="add-record-form">
        <input type="text" id="employee-id" placeholder="Employee ID" required>
        <input type="text" id="name" placeholder="Name" required>
        <input type="number" id="hours-worked" placeholder="Hours Worked" required>
        <input type="number" id="hourly-rate" placeholder="Hourly Rate" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="state" placeholder="State" required>
        <input type="text" id="country" placeholder="Country" required>
        <button type="submit">Add Record</button>
    </form>

    <h2>Payroll Data</h2>
    <button id="save-csv">Save as CSV</button>
    <button id="export-csv">Export as CSV</button>
    <input type="file" id="import-csv" accept=".csv">
    <button id="validate-data">Validate Data</button>
    <button id="correct-data">Correct Data</button>
    <div id="progress-bar-container" style="display: none;">
        <div id="progress-bar" style="width: 0%; height: 20px; background-color: yellow;"></div>
    </div>
    <table id="payroll-table">
        <thead>
            <tr>
                <th>Employee ID</th>
                <th>Name</th>
                <th>Hours Worked</th>
                <th>Hourly Rate</th>
                <th>Gross Pay</th>
                <th>Email</th>
                <th>State</th>
                <th>Country</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <h2>Log</h2>
    <div id="log"></div>

    <div id="correction-modal" style="display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
        <div style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%;">
            <h2>Correction Suggestion</h2>
            <p><strong>Employee ID:</strong> <span id="employee-id-correction"></span></p>
            <p><strong>Field:</strong> <span id="correction-field"></span></p>
            <p><strong>Original Value:</strong> <span id="original-value"></span></p>
            <p><strong>Suggested Value:</strong> <span id="suggested-value"></span></p>
            <button id="manual-correction-btn">Manual Correction</button>
            <button id="agree-correction">Agree</button>
            <button id="agree-all-correction">Agree to All</button>
            <button id="skip-correction">Skip</button>
            <button id="cancel-correction">Cancel</button>
        </div>
    </div>

    <div id="manual-correction-modal" style="display: none; position: fixed; z-index: 2; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
        <div style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%;">
            <h2>Manual Correction</h2>
            <input type="text" id="manual-correction-input">
            <button id="title-case-btn">Title Case</button>
            <button id="upper-case-btn">Upper Case</button>
            <button id="lower-case-btn">Lower Case</button>
            <button id="save-manual-correction">Save</button>
            <button id="cancel-manual-correction">Cancel</button>
        </div>
    </div>

    <script>
        const addRecordForm = document.getElementById('add-record-form');
        const payrollTableBody = document.querySelector('#payroll-table tbody');
        let payrollData = [];

        addRecordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newRecord = {
                employeeId: document.getElementById('employee-id').value,
                name: document.getElementById('name').value,
                hoursWorked: parseFloat(document.getElementById('hours-worked').value),
                hourlyRate: parseFloat(document.getElementById('hourly-rate').value),
                email: document.getElementById('email').value,
                state: document.getElementById('state').value,
                country: document.getElementById('country').value
            };
            payrollData.push(newRecord);
            renderTable();
            addRecordForm.reset();
        });

        function renderTable() {
            payrollTableBody.innerHTML = '';
            payrollData.forEach(record => {
                const row = document.createElement('tr');
                const grossPay = record.hoursWorked * record.hourlyRate;
                row.innerHTML = `
                    <td>${record.employeeId}</td>
                    <td>${record.name}</td>
                    <td>${record.hoursWorked}</td>
                    <td>${record.hourlyRate}</td>
                    <td>${grossPay.toFixed(2)}</td>
                    <td>${record.email}</td>
                    <td>${record.state}</td>
                    <td>${record.country}</td>
                `;
                payrollTableBody.appendChild(row);
            });
        }

        function downloadCSV(csv, filename) {
            const csvFile = new Blob([csv], {type: 'text/csv'});
            const downloadLink = document.createElement('a');
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = 'none';
            document.body.appendChild(downloadLink);
            downloadLink.click();
        }

        function exportToCSV() {
            const headers = ['Employee ID', 'Name', 'Hours Worked', 'Hourly Rate', 'Email', 'State', 'Country'];
            const rows = payrollData.map(record =>
                `${record.employeeId},${record.name},${record.hoursWorked},${record.hourlyRate},${record.email},${record.state},${record.country}`
            );
            const csv = [headers.join(','), ...rows].join('\n');
            downloadCSV(csv, 'payroll.csv');
        }

        document.getElementById('save-csv').addEventListener('click', exportToCSV);
        document.getElementById('export-csv').addEventListener('click', exportToCSV);

        document.getElementById('import-csv').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    const rows = text.replace(/\r\n/g, '\n').split('\n').slice(1);
                    rows.forEach(row => {
                        const [employeeId, name, hoursWorked, hourlyRate, email, state, country] = row.split(',');
                        if (employeeId && name && hoursWorked && hourlyRate) {
                            payrollData.push({
                                employeeId,
                                name,
                                hoursWorked: parseFloat(hoursWorked),
                                hourlyRate: parseFloat(hourlyRate),
                                email,
                                state,
                                country
                            });
                        }
                    });
                    renderTable();
                };
                reader.readAsText(file);
            }
        });

        let validationErrors = [];
        document.getElementById('validate-data').addEventListener('click', () => {
            validationErrors = [];
            const log = document.getElementById('log');
            log.innerHTML = '';

            payrollData.forEach((record, index) => {
                if (isNaN(record.hoursWorked) || record.hoursWorked <= 0) {
                    validationErrors.push({index, field: 'hoursWorked', suggestion: 40, message: `Invalid hours worked for ${record.name}`});
                }
                if (isNaN(record.hourlyRate) || record.hourlyRate <= 0) {
                    validationErrors.push({index, field: 'hourlyRate', suggestion: 15, message: `Invalid hourly rate for ${record.name}`});
                }
            });

            if (validationErrors.length > 0) {
                log.innerHTML = 'Validation Errors Found:\\n' + validationErrors.map(e => e.message).join('\\n');
            } else {
                log.innerHTML = 'No validation errors found.';
            }
        });

        function simulateProgress(color, onComplete) {
            const progressBarContainer = document.getElementById('progress-bar-container');
            const progressBar = document.getElementById('progress-bar');
            progressBarContainer.style.display = 'block';
            progressBar.style.backgroundColor = color;
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    progressBarContainer.style.display = 'none';
                    onComplete();
                } else {
                    width++;
                    progressBar.style.width = width + '%';
                }
            }, 10);
        }

        document.getElementById('validate-data').addEventListener('click', () => {
            simulateProgress('yellow', () => {
                validationErrors = [];
                const log = document.getElementById('log');
                log.innerHTML = '';

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                payrollData.forEach((record, index) => {
                    // Name checks
                    const cleanedName = record.name.trim().toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
                    if (record.name !== cleanedName) {
                        validationErrors.push({index, field: 'name', suggestion: cleanedName, message: `Formatting issues in name for ${record.name}`});
                    }

                    // Hours and Rate checks
                    if (isNaN(record.hoursWorked) || record.hoursWorked <= 0) {
                        validationErrors.push({index, field: 'hoursWorked', suggestion: 40, message: `Invalid hours worked for ${record.name}`});
                    }
                    if (isNaN(record.hourlyRate) || record.hourlyRate <= 0) {
                        validationErrors.push({index, field: 'hourlyRate', suggestion: 15, message: `Invalid hourly rate for ${record.name}`});
                    }

                    // Email check
                    if (!emailRegex.test(record.email)) {
                        const nameParts = cleanedName.toLowerCase().split(' ');
                        const suggestedEmail = `${nameParts[0]}.${nameParts[1]}@example.com`;
                        validationErrors.push({index, field: 'email', suggestion: suggestedEmail, message: `Invalid email format for ${record.name}`});
                    }

                    // State and Country checks
                    const cleanedState = record.state.trim().toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
                    if (record.state !== cleanedState) {
                        validationErrors.push({index, field: 'state', suggestion: cleanedState, message: `Formatting issues in state for ${record.name}`});
                    }

                    const countryCorrections = {'u.s.a.': 'USA', 'united states': 'USA'};
                    const trimmedCountry = record.country.trim().toLowerCase();
                     if (countryCorrections[trimmedCountry]) {
                        validationErrors.push({index, field: 'country', suggestion: countryCorrections[trimmedCountry], message: `Potential misspelling in country for ${record.name}`});
                    }
                });

                if (validationErrors.length > 0) {
                    log.innerHTML = 'Validation Errors Found:\\n' + validationErrors.map(e => e.message).join('\\n');
                } else {
                    log.innerHTML = 'No validation errors found.';
                }
            });
        });

        let currentErrorIndex = 0;
        let agreeToAll = false;

        function showCorrectionModal() {
            if (currentErrorIndex >= validationErrors.length) {
                document.getElementById('log').innerHTML = 'All errors processed.';
                document.getElementById('correction-modal').style.display = 'none';
                renderTable();
                return;
            }

            const error = validationErrors[currentErrorIndex];
            document.getElementById('employee-id-correction').textContent = payrollData[error.index].employeeId;
            document.getElementById('correction-field').textContent = error.field;
            document.getElementById('original-value').textContent = payrollData[error.index][error.field];
            document.getElementById('suggested-value').textContent = error.suggestion;
            document.getElementById('correction-modal').style.display = 'block';
        }

        document.getElementById('correct-data').addEventListener('click', () => {
            currentErrorIndex = 0;
            agreeToAll = false;
            showCorrectionModal();
        });

        document.getElementById('agree-correction').addEventListener('click', () => {
            const error = validationErrors[currentErrorIndex];
            payrollData[error.index][error.field] = document.getElementById('suggested-value').textContent;
            currentErrorIndex++;
            showCorrectionModal();
        });

        document.getElementById('agree-all-correction').addEventListener('click', () => {
            agreeToAll = true;
            validationErrors.forEach(error => {
                payrollData[error.index][error.field] = error.suggestion;
            });
            currentErrorIndex = validationErrors.length;
            showCorrectionModal();
        });

        document.getElementById('skip-correction').addEventListener('click', () => {
            currentErrorIndex++;
            showCorrectionModal();
        });

        document.getElementById('cancel-correction').addEventListener('click', () => {
            currentErrorIndex = validationErrors.length;
            showCorrectionModal();
        });

        document.getElementById('manual-correction-btn').addEventListener('click', () => {
            document.getElementById('manual-correction-modal').style.display = 'block';
            document.getElementById('manual-correction-input').value = document.getElementById('suggested-value').textContent;
        });

        document.getElementById('cancel-manual-correction').addEventListener('click', () => {
            document.getElementById('manual-correction-modal').style.display = 'none';
        });

        document.getElementById('save-manual-correction').addEventListener('click', () => {
            const manualCorrection = document.getElementById('manual-correction-input').value;
            const error = validationErrors[currentErrorIndex];
            payrollData[error.index][error.field] = manualCorrection;
            validationErrors.splice(currentErrorIndex, 1);
            document.getElementById('manual-correction-modal').style.display = 'none';
            showCorrectionModal();
        });

        document.getElementById('title-case-btn').addEventListener('click', () => {
            const input = document.getElementById('manual-correction-input');
            input.value = input.value.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
        });

        document.getElementById('upper-case-btn').addEventListener('click', () => {
            const input = document.getElementById('manual-correction-input');
            input.value = input.value.toUpperCase();
        });

        document.getElementById('lower-case-btn').addEventListener('click', () => {
            const input = document.getElementById('manual-correction-input');
            input.value = input.value.toLowerCase();
        });
    </script>
</body>
</html>
